<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Website Hosted</title>
    <!-- Tailwind CSS for rapid, modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* A gentle fade-in animation for a premium feel */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen flex flex-col font-sans transition-colors duration-300 antialiased">
    
    <!-- Main Content Area: Flex-grow ensures it takes up available space, pushing the footer down -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center animate-fade-in">
        
        <!-- Decorative Icon (Globe with a clean, minimal look) -->
        <div class="mb-8 p-4 bg-slate-100 dark:bg-slate-800 rounded-full shadow-sm ring-1 ring-slate-200 dark:ring-slate-700">
            <svg class="w-12 h-12 text-slate-400 dark:text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
            </svg>
        </div>

        <!-- Primary Message -->
        <h1 class="text-3xl md:text-5xl font-semibold tracking-tight text-slate-900 dark:text-white mb-4">
            No website hosted at the moment
        </h1>
        
        <!-- Secondary Context Text -->
        <p class="text-slate-500 dark:text-slate-400 max-w-md mx-auto text-lg">
            This domain is successfully registered and active, but there is currently no content configured to be displayed here.
        </p>
        
    </main>

    <!-- Footer Area: Sticks to the bottom due to the flex-grow on the main element -->
    <footer class="w-full py-6 text-center animate-fade-in" style="animation-delay: 0.2s; opacity: 0;">
        <p class="text-sm text-slate-500 dark:text-slate-500">
            Hosted by <span class="font-medium text-slate-700 dark:text-slate-300 tracking-wide">RMB and Github Pages</span>
        </p>
    </footer>

</body>
</html>
