<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Java Hangman Collab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; overscroll-behavior: none; }
        .font-code { font-family: 'Fira Code', monospace; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .tab-active { color: #60A5FA; border-bottom: 2px solid #60A5FA; background-color: rgba(31, 41, 55, 0.5); }
        .tab-inactive { color: #9CA3AF; border-bottom: 2px solid transparent; }
        .tab-inactive:hover { color: #E5E7EB; background-color: rgba(31, 41, 55, 0.3); }
        .tab-run-active { color: #4ade80; border-bottom: 2px solid #4ade80; background-color: rgba(20, 83, 45, 0.3); }

        /* Sync indicator animation */
        @keyframes pulse-sync { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .syncing .sync-icon { animation: pulse-sync 1s infinite; color: #3b82f6; }
        
        /* Stop iOS textarea zooming */
        input, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-200 h-screen flex flex-col overflow-hidden">

    <!-- Login Modal -->
    <div id="login-overlay" class="fixed inset-0 bg-black bg-opacity-90 z-[100] flex justify-center items-center backdrop-blur-sm transition-opacity px-4">
        <div class="bg-neutral-900 border border-neutral-800 p-6 sm:p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-blue-900/30 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-800/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-white">Join Code Room</h2>
            <p class="text-sm text-neutral-400 mb-6">Enter your name to collaborate live on this Java project.</p>
            <p id="login-error" class="text-red-400 text-sm font-semibold mb-3 hidden"></p>
            <input type="text" id="username-input" class="w-full bg-neutral-950 border border-neutral-700 text-white px-4 py-3 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Your Name" />
            <button id="join-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors shadow-md">Enter Workspace</button>
        </div>
    </div>

    <!-- Manual Copy Modal -->
    <div id="manual-copy-modal" class="fixed inset-0 bg-black bg-opacity-90 z-[100] flex justify-center items-center backdrop-blur-sm hidden transition-opacity px-4">
        <div class="bg-neutral-900 border border-neutral-800 p-6 rounded-xl shadow-2xl max-w-sm w-full text-center">
            <h3 class="text-xl font-bold mb-2 text-white">Share Room Link</h3>
            <p class="text-sm text-neutral-400 mb-4">Manually copy the link below to invite others.</p>
            <input type="text" id="manual-room-link" class="w-full bg-neutral-950 border border-neutral-700 px-4 py-3 rounded-lg mb-4 text-blue-400 font-mono text-sm outline-none" readonly />
            <button onclick="document.getElementById('manual-copy-modal').classList.add('hidden')" class="w-full bg-neutral-700 hover:bg-neutral-600 text-white font-semibold py-2.5 rounded-lg transition-colors">Close</button>
        </div>
    </div>

    <!-- Main Workspace Container -->
    <div id="app-container" class="hidden flex-col h-full w-full">
        
        <!-- Header -->
        <header class="bg-neutral-900 border-b border-neutral-800 p-3 sm:px-4 flex items-center justify-between shrink-0 z-20">
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="bg-blue-600 p-1.5 rounded text-white shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                </div>
                <div class="truncate">
                    <h1 class="text-sm sm:text-base font-bold text-white truncate">Java Hangman Collab</h1>
                    <div class="flex items-center gap-1.5 text-xs text-neutral-400" id="sync-status">
                        <svg class="w-3 h-3 sync-icon text-neutral-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                        <span id="sync-text">Synced Live</span>
                    </div>
                </div>
            </div>
            <button id="copy-link-btn" onclick="window.copyRoomLink()" class="flex items-center gap-1.5 bg-neutral-800 hover:bg-neutral-700 text-xs sm:text-sm font-semibold px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg transition-colors border border-neutral-700 text-neutral-300 shrink-0">
                <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                <span class="hidden sm:inline">Invite</span>
            </button>
        </header>

        <!-- Live Presence Bar -->
        <div class="bg-neutral-950 border-b border-neutral-800 px-3 py-2 flex items-center gap-2 overflow-x-auto shrink-0 hide-scroll relative">
            <span class="text-xs font-semibold text-neutral-500 uppercase tracking-wider shrink-0 mr-1">Online:</span>
            <div id="presence-list" class="flex items-center gap-2">
                <!-- Avatars injected via JS -->
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex bg-neutral-900 border-b border-neutral-800 shrink-0 overflow-x-auto hide-scroll">
            <button id="tab-main" class="px-4 py-3 min-w-[100px] flex-1 flex items-center justify-center gap-2 font-medium transition-colors tab-active text-sm shrink-0" onclick="window.switchTab('main')">
                <svg class="w-4 h-4 text-orange-400" viewBox="0 0 24 24" fill="currentColor"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/></svg>
                Main.java
            </button>
            <button id="tab-game" class="px-4 py-3 min-w-[100px] flex-1 flex items-center justify-center gap-2 font-medium transition-colors tab-inactive text-sm shrink-0" onclick="window.switchTab('game')">
                <svg class="w-4 h-4 text-orange-400" viewBox="0 0 24 24" fill="currentColor"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/></svg>
                Game.java
            </button>
            <button id="tab-run" class="px-4 py-3 min-w-[120px] flex-1 flex items-center justify-center gap-2 font-medium transition-colors tab-inactive text-sm shrink-0" onclick="window.switchTab('run')">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                Terminal
            </button>
        </div>

        <!-- Main Workspace Area -->
        <main class="flex-1 relative w-full h-full bg-[#1e1e1e]">
            
            <!-- Editor: Main.java -->
            <div id="view-main" class="absolute inset-0 flex flex-col">
                <div class="bg-[#2d2d2d] px-4 py-1.5 text-xs font-mono text-neutral-400 border-b border-neutral-800 flex justify-between shrink-0">
                    <span>src/Main.java</span>
                    <span id="typing-indicator-main" class="text-blue-400 italic opacity-0 transition-opacity">Someone is typing...</span>
                </div>
                <textarea id="editor-main" spellcheck="false" class="flex-1 w-full bg-transparent text-[#d4d4d4] font-code p-4 resize-none outline-none leading-relaxed" oninput="window.debouncedSaveCode('main')"></textarea>
            </div>

            <!-- Editor: Game.java -->
            <div id="view-game" class="absolute inset-0 hidden flex-col">
                <div class="bg-[#2d2d2d] px-4 py-1.5 text-xs font-mono text-neutral-400 border-b border-neutral-800 flex justify-between shrink-0">
                    <span>src/Game.java</span>
                    <span id="typing-indicator-game" class="text-blue-400 italic opacity-0 transition-opacity">Someone is typing...</span>
                </div>
                <textarea id="editor-game" spellcheck="false" class="flex-1 w-full bg-transparent text-[#d4d4d4] font-code p-4 resize-none outline-none leading-relaxed" oninput="window.debouncedSaveCode('game')"></textarea>
            </div>

            <!-- Run View (Terminal) -->
            <div id="view-run" class="absolute inset-0 hidden flex-col bg-black">
                <div class="bg-[#2d2d2d] px-4 py-1.5 text-xs font-mono text-neutral-400 border-b border-neutral-800 flex justify-between items-center shrink-0">
                    <span>java Main</span>
                    <button onclick="window.startGame()" class="text-green-400 hover:text-green-300 flex items-center gap-1 bg-green-900/30 px-2 py-0.5 rounded">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Compile & Run
                    </button>
                </div>
                
                <div id="terminal-output" class="flex-1 overflow-y-auto p-4 font-code text-sm text-green-400 leading-relaxed whitespace-pre-wrap break-words"></div>
                
                <form id="input-form" class="bg-[#1a1a1a] border-t border-neutral-800 p-2 flex gap-2 shrink-0">
                    <span class="text-green-500 font-code py-2 pl-2">&gt;</span>
                    <input 
                        type="text" 
                        id="terminal-input" 
                        autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
                        class="flex-1 bg-transparent text-white font-code px-2 py-2 outline-none"
                        placeholder="Type input here..."
                    >
                    <button type="submit" id="submit-btn" class="bg-neutral-800 hover:bg-neutral-700 text-white px-4 py-2 rounded text-sm transition-colors border border-neutral-700">Enter</button>
                </form>
            </div>

        </main>
    </div>

    <!-- APP LOGIC & FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Default Code Templates
        const DEFAULT_MAIN = `// Main class to run the Hangman program
public class Main {
    public static void main(String[] args) {
        // Create a new game instance and start playing
        Game hangmanGame = new Game();
        hangmanGame.play();
    }
}`;

        const DEFAULT_GAME = `import java.util.Scanner;
import java.util.Random;

// Class containing all the logic for the Hangman game
public class Game {
    
    // The engine reads this array directly when you hit "Run"! Edit these words to test it!
    private String[] wordList = {"JAVA", "ECLIPSE", "ROUTER", "KEYBOARD", "VARIABLE"}; 
    
    private String secretWord;
    private char[] guessedWord;
    private int attempts;
    private Scanner scanner;

    public Game() {
        Random rand = new Random();
        secretWord = wordList[rand.nextInt(wordList.length)];
        guessedWord = new char[secretWord.length()];
        for (int i = 0; i < guessedWord.length; i++) guessedWord[i] = '_';
        attempts = 5; 
        scanner = new Scanner(System.in);
    }

    public void play() {
        System.out.println("Welcome to Hangman!");
        while (attempts > 0 && new String(guessedWord).contains("_")) {
            displayStatus();
            char userGuess = getValidInput();
            processGuess(userGuess);
        }
        if (!new String(guessedWord).contains("_")) System.out.println("\\nCongrats! You guessed the word: " + secretWord);
        else System.out.println("\\nGame Over! The word was: " + secretWord);
    }

    private void displayStatus() {
        System.out.println("\\nWord: " + new String(guessedWord));
        System.out.println("Attempts left: " + attempts);
    }

    private char getValidInput() {
        while (true) {
            System.out.print("Guess a letter: ");
            try {
                String input = scanner.nextLine().toUpperCase();
                if (input.isEmpty()) throw new Exception("Input cannot be empty.");
                char guess = input.charAt(0); 
                if (!Character.isLetter(guess)) throw new Exception("Letters only.");
                return guess; 
            } catch (Exception e) { System.out.println("Error: " + e.getMessage()); }
        }
    }

    private void processGuess(char guess) {
        boolean found = false;
        for (int i = 0; i < secretWord.length(); i++) {
            if (secretWord.charAt(i) == guess) { guessedWord[i] = guess; found = true; }
        }
        if (!found) { attempts--; System.out.println("Incorrect guess!"); } 
        else System.out.println("Good guess!");
    }
}`;

        // --- URL & ROOM LOGIC ---
        const urlParams = new URLSearchParams(window.location.search);
        let currentRoomId = urlParams.get('room');
        if (!currentRoomId) {
            currentRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?room=' + currentRoomId;
            window.history.replaceState({path:newUrl}, '', newUrl);
        }
        document.getElementById('room-id-display').textContent = currentRoomId;

        // --- FIREBASE CONFIG (Secured via Base64 to prevent generic bot scraping) ---
        const _obfuscatedFc = "eyJhcGlLZXkiOiJBSXphU3lDTVE4aElZMWFNWVM1YzdxamxvZzNLVmN6eEpLbTVNakEiLCJhdXRoRG9tYWluIjoibnN0cC1kb2MuZmlyZWJhc2VhcHAuY29tIiwicHJvamVjdElkIjoibnN0cC1kb2MiLCJzdG9yYWdlQnVja2V0IjoibnN0cC1kb2MuZmlyZWJhc2VzdG9yYWdlLmFwcCIsIm1lc3NhZ2luZ1NlbmRlcklkIjoiNzA1MjIxNTE2ODMwIiwiYXBwSWQiOiIxOjcwNTIyMTUxNjgzMDp3ZWI6OTQ1ZmIzYTMyMDc1ODZkNWI4ZDgwZiJ9";
        const firebaseConfig = JSON.parse(atob(_obfuscatedFc));
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        const baseAppId = typeof __app_id !== 'undefined' ? __app_id : 'java-collab-app';
        const COLL_CODE = `code_room_${currentRoomId}`;
        const COLL_PRESENCE = `presence_room_${currentRoomId}`;

        // App State
        let myUsername = '';
        let myUid = '';
        let currentTab = 'main'; // main, game, run
        let isTyping = false;
        let writeTimer = null;
        let activeUsers = {};

        // --- UI & TAB LOGIC ---
        window.switchTab = (tab) => {
            currentTab = tab;
            const btnMain = document.getElementById('tab-main');
            const btnGame = document.getElementById('tab-game');
            const btnRun = document.getElementById('tab-run');
            const viewMain = document.getElementById('view-main');
            const viewGame = document.getElementById('view-game');
            const viewRun = document.getElementById('view-run');

            // Reset tabs
            [btnMain, btnGame, btnRun].forEach(btn => btn.className = "px-4 py-3 min-w-[100px] flex-1 flex items-center justify-center gap-2 font-medium transition-colors tab-inactive text-sm shrink-0");
            [viewMain, viewGame, viewRun].forEach(view => { view.classList.add('hidden'); view.classList.remove('flex'); });

            if (tab === 'main') {
                btnMain.classList.add('tab-active'); btnMain.classList.remove('tab-inactive');
                viewMain.classList.remove('hidden'); viewMain.classList.add('flex');
            } else if (tab === 'game') {
                btnGame.classList.add('tab-active'); btnGame.classList.remove('tab-inactive');
                viewGame.classList.remove('hidden'); viewGame.classList.add('flex');
            } else if (tab === 'run') {
                btnRun.classList.add('tab-run-active'); btnRun.classList.remove('tab-inactive');
                viewRun.classList.remove('hidden'); viewRun.classList.add('flex');
                document.getElementById('terminal-input').focus();
            }

            // Update Presence State
            if(myUid) setDoc(doc(db, 'artifacts', baseAppId, 'public', 'data', COLL_PRESENCE, myUid), { currentFile: tab }, { merge: true });
            renderPresenceUI();
        };

        function setSyncStatus(status) {
            const el = document.getElementById('app-container');
            const txt = document.getElementById('sync-text');
            if(status === 'syncing') { el.classList.add('syncing'); txt.textContent = 'Saving...'; } 
            else if (status === 'synced') { el.classList.remove('syncing'); txt.textContent = 'Synced Live'; }
        }

        // --- AUTHENTICATION ---
        document.getElementById('join-btn').addEventListener('click', async () => {
            const input = document.getElementById('username-input').value.trim();
            const errorMsg = document.getElementById('login-error');
            if(!input) { errorMsg.textContent = "Please enter a name."; errorMsg.classList.remove('hidden'); return; }
            errorMsg.classList.add('hidden');
            myUsername = input;
            document.getElementById('join-btn').textContent = "Connecting...";

            try {
                let userCred;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && Object.keys(firebaseConfig).length === 0) {
                    userCred = await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    userCred = await signInAnonymously(auth);
                }
                myUid = userCred.user.uid;
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('flex');
                
                startPresence();
                startCodeSync();
                window.switchTab('main');
            } catch (error) {
                console.error("Auth error", error);
                errorMsg.textContent = "Connection failed. Please check network.";
                errorMsg.classList.remove('hidden');
                document.getElementById('join-btn').textContent = "Enter Workspace";
            }
        });

        // --- PRESENCE LOGIC ---
        function startPresence() {
            const myPresenceRef = doc(db, 'artifacts', baseAppId, 'public', 'data', COLL_PRESENCE, myUid);
            setDoc(myPresenceRef, { username: myUsername, lastActive: Date.now(), currentFile: currentTab, color: getRandomColor(myUid) });
            
            // Heartbeat
            setInterval(() => setDoc(myPresenceRef, { lastActive: Date.now() }, { merge: true }), 10000);

            // Listen to others
            onSnapshot(collection(db, 'artifacts', baseAppId, 'public', 'data', COLL_PRESENCE), (snapshot) => {
                activeUsers = {};
                snapshot.docs.forEach(d => activeUsers[d.id] = d.data());
                renderPresenceUI();
            });
        }

        function renderPresenceUI() {
            const list = document.getElementById('presence-list');
            if(!list) return;
            
            let html = '';
            let typingMain = false;
            let typingGame = false;

            const now = Date.now();
            Object.entries(activeUsers).forEach(([uid, u]) => {
                if (now - u.lastActive > 25000) return; // Skip offline users
                
                const isMe = uid === myUid;
                const initial = u.username ? u.username.charAt(0).toUpperCase() : '?';
                const fileBadge = u.currentFile === 'main' ? 'Main.java' : (u.currentFile === 'game' ? 'Game.java' : 'Terminal');
                
                html += `
                    <div class="flex items-center gap-1.5 bg-neutral-800 rounded-full pl-1 pr-3 py-1 border border-neutral-700 shrink-0" title="${u.username} is viewing ${fileBadge}">
                        <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white shrink-0" style="background-color: ${u.color}">
                            ${initial}
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-semibold leading-none text-neutral-200">${escapeHtml(u.username)}${isMe?' (You)':''}</span>
                            <span class="text-[9px] text-neutral-500 leading-none mt-0.5">${fileBadge}</span>
                        </div>
                    </div>
                `;

                if (!isMe) {
                    if(u.currentFile === 'main') typingMain = true;
                    if(u.currentFile === 'game') typingGame = true;
                }
            });
            
            list.innerHTML = html || '<span class="text-xs text-neutral-600 italic">No one else is online.</span>';
            
            document.getElementById('typing-indicator-main').style.opacity = typingMain ? '1' : '0';
            document.getElementById('typing-indicator-game').style.opacity = typingGame ? '1' : '0';
        }

        function getRandomColor(seed) {
            const colors = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', '#06b6d4', '#14b8a6', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e'];
            let hash = 0;
            for (let i = 0; i < seed.length; i++) hash = seed.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        // --- LIVE CODE SYNC ---
        function startCodeSync() {
            setSyncStatus('synced');
            const docRef = doc(db, 'artifacts', baseAppId, 'public', 'data', COLL_CODE, 'source');
            
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    
                    // Only update DOM if we aren't actively typing to prevent cursor jumping
                    if (!isTyping || data.lastEditedBy !== myUid) {
                        smartUpdateTextarea('editor-main', data.mainCode !== undefined ? data.mainCode : DEFAULT_MAIN);
                        smartUpdateTextarea('editor-game', data.gameCode !== undefined ? data.gameCode : DEFAULT_GAME);
                    }
                } else {
                    // Initialize Room
                    setDoc(docRef, { mainCode: DEFAULT_MAIN, gameCode: DEFAULT_GAME, lastEditedBy: myUid });
                }
            });
        }

        // Retains cursor position when updating text from remote
        function smartUpdateTextarea(id, newText) {
            const el = document.getElementById(id);
            if (el.value === newText) return;
            const start = el.selectionStart;
            const end = el.selectionEnd;
            el.value = newText;
            el.setSelectionRange(start, end);
        }

        window.debouncedSaveCode = (type) => {
            isTyping = true;
            setSyncStatus('syncing');
            clearTimeout(writeTimer);
            
            writeTimer = setTimeout(() => {
                const mainCode = document.getElementById('editor-main').value;
                const gameCode = document.getElementById('editor-game').value;
                
                setDoc(doc(db, 'artifacts', baseAppId, 'public', 'data', COLL_CODE, 'source'), {
                    mainCode: mainCode,
                    gameCode: gameCode,
                    lastEditedBy: myUid
                }, { merge: true }).then(() => {
                    setSyncStatus('synced');
                    setTimeout(() => { isTyping = false; }, 500); // Give padding before accepting remote overrides
                });
            }, 800);
        };

        // --- TERMINAL & JAVA EMULATOR LOGIC ---
        let javaGameState = 'IDLE'; 
        let secretWord = '';
        let guessedWord = [];
        let attempts = 0;
        let dynamicWordList = [];

        const terminalOutput = document.getElementById('terminal-output');
        const terminalInput = document.getElementById('terminal-input');
        const inputForm = document.getElementById('input-form');

        function printLine(text) {
            const line = document.createElement('div');
            line.textContent = text;
            terminalOutput.appendChild(line);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        function appendToLastLine(text) {
            if (terminalOutput.lastChild) terminalOutput.lastChild.textContent += text;
            else printLine(text);
        }

        // QoL: Extract the word list string array directly from the user's collaborative Game.java code!
        function extractWordsFromCode() {
            const code = document.getElementById('editor-game').value;
            const fallback = ["JAVA", "ECLIPSE", "ROUTER", "KEYBOARD", "VARIABLE"];
            try {
                // Look for: String[] wordList = {"A", "B"};
                const regex = /String\[\]\s+\w+\s*=\s*\{(.*?)\};/s;
                const match = code.match(regex);
                if (match && match[1]) {
                    const parsed = match[1].split(',')
                        .map(s => s.replace(/['"\s]/g, '').toUpperCase())
                        .filter(s => s.length > 0 && /^[A-Z]+$/.test(s)); // letters only
                    if (parsed.length > 0) return parsed;
                }
            } catch (e) { console.warn("Could not parse Java array, using fallback"); }
            return fallback;
        }

        window.startGame = () => {
            terminalOutput.innerHTML = '';
            printLine("> javac Main.java Game.java");
            printLine("> java Main");
            
            dynamicWordList = extractWordsFromCode();
            secretWord = dynamicWordList[Math.floor(Math.random() * dynamicWordList.length)];
            guessedWord = Array(secretWord.length).fill('_');
            attempts = 5;
            javaGameState = 'PLAYING';
            
            terminalInput.disabled = false;
            terminalInput.placeholder = "Type letter and press Enter...";
            terminalInput.focus();

            printLine("Welcome to Hangman!");
            displayGameStatus();
            printLine("Guess a letter: ");
        };

        function displayGameStatus() {
            printLine("");
            printLine(`Word: ${guessedWord.join('')}`);
            printLine(`Attempts left: ${attempts}`);
        }

        inputForm.addEventListener('submit', function(e) {
            e.preventDefault();
            if (javaGameState !== 'PLAYING') {
                window.startGame();
                return;
            }

            const rawInput = terminalInput.value;
            const inputUpper = rawInput.toUpperCase();
            terminalInput.value = '';

            appendToLastLine(rawInput);

            if (inputUpper.length === 0) {
                printLine("Error: Input cannot be empty.");
                printLine("Guess a letter: ");
                terminalOutput.scrollTop = terminalOutput.scrollHeight;
                return;
            }

            const guess = inputUpper.charAt(0);

            if (!/^[A-Z]$/.test(guess)) {
                printLine("Error: Invalid input. Please enter letters only.");
                printLine("Guess a letter: ");
                terminalOutput.scrollTop = terminalOutput.scrollHeight;
                return;
            }

            let found = false;
            for (let i = 0; i < secretWord.length; i++) {
                if (secretWord.charAt(i) === guess) {
                    guessedWord[i] = guess;
                    found = true;
                }
            }

            if (!found) { attempts--; printLine("Incorrect guess!"); } 
            else { printLine("Good guess!"); }

            if (!guessedWord.includes('_')) {
                printLine("\nCongrats! You guessed the word: " + secretWord);
                endGame();
            } else if (attempts === 0) {
                printLine("\nGame Over! The word was: " + secretWord);
                endGame();
            } else {
                displayGameStatus();
                printLine("Guess a letter: ");
                terminalOutput.scrollTop = terminalOutput.scrollHeight;
            }
        });

        function endGame() {
            javaGameState = 'GAME_OVER';
            terminalInput.placeholder = "Press Enter to run again.";
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        // --- UTILS ---
        window.copyRoomLink = async () => {
            const link = window.location.href;
            try {
                if (navigator.clipboard) await navigator.clipboard.writeText(link);
                else throw new Error();
                
                const btnSpan = document.querySelector('#copy-link-btn span');
                const original = btnSpan.textContent;
                btnSpan.textContent = "Copied!";
                setTimeout(() => btnSpan.textContent = original, 2500);
            } catch (err) {
                try {
                    const temp = document.createElement("input"); temp.value = link;
                    document.body.appendChild(temp); temp.select(); document.execCommand("copy"); document.body.removeChild(temp);
                } catch(e) {
                    const modal = document.getElementById('manual-copy-modal');
                    const input = document.getElementById('manual-room-link');
                    input.value = link; modal.classList.remove('hidden');
                    setTimeout(() => { input.focus(); input.select(); }, 100);
                }
            }
        };

        function escapeHtml(unsafe) {
            return String(unsafe).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
